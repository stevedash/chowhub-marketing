<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChowHub POS — Manage Plan</title>
  <meta name="description" content="Downgrade or cancel your ChowHub POS subscription." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/upgrade.css" />
  <style>
    .manage-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 48px;
      max-width: 480px;
      margin: 80px auto 0;
    }
    @media (prefers-color-scheme: dark) {
      .manage-card { background: #1e293b; border-color: #334155; }
    }
    .manage-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 8px;
    }
    @media (prefers-color-scheme: dark) {
      .manage-card h1 { color: #f1f5f9; }
    }
    .manage-card p.sub {
      color: #64748b;
      font-size: 0.95rem;
      margin: 0 0 32px;
    }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
    }
    .field-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: #0f172a;
      background: #f8fafc;
      box-sizing: border-box;
      margin-bottom: 24px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: #6366f1; background: #fff; }
    @media (prefers-color-scheme: dark) {
      .field-input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
      .field-input:focus { border-color: #818cf8; background: #1e293b; }
    }
    .radio-group { margin-bottom: 28px; }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s;
    }
    .radio-option:hover { border-color: #6366f1; background: #f5f3ff; }
    .radio-option.selected { border-color: #6366f1; background: #f5f3ff; }
    @media (prefers-color-scheme: dark) {
      .radio-option { border-color: #334155; }
      .radio-option:hover, .radio-option.selected { border-color: #818cf8; background: #1e1b4b; }
    }
    .radio-option input[type="radio"] { accent-color: #6366f1; width: 18px; height: 18px; }
    .radio-option-cancel { margin-top: 8px; border-top: 1px dashed #e2e8f0; padding-top: 18px; border-radius: 12px; }
    .radio-option-cancel:hover { border-color: #ef4444; background: #fef2f2; }
    .radio-option-cancel.selected { border-color: #ef4444; background: #fef2f2; }
    .radio-option-cancel input[type="radio"] { accent-color: #ef4444; }
    @media (prefers-color-scheme: dark) {
      .radio-option-cancel:hover, .radio-option-cancel.selected { border-color: #ef4444; background: #450a0a; }
    }
    .radio-option-info { flex: 1; }
    .radio-option-name { font-weight: 600; font-size: 0.95rem; color: #0f172a; }
    .radio-option-desc { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    @media (prefers-color-scheme: dark) {
      .radio-option-name { color: #f1f5f9; }
    }
    .manage-btn {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .manage-btn:hover { background: #4f46e5; }
    .manage-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .manage-btn.danger { background: #ef4444; }
    .manage-btn.danger:hover { background: #dc2626; }
    .result-box {
      display: none;
      margin-top: 24px;
      padding: 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .result-box.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .result-box.error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    @media (prefers-color-scheme: dark) {
      .result-box.success { background: #052e16; border-color: #166534; color: #86efac; }
      .result-box.error   { background: #450a0a; border-color: #991b1b; color: #fca5a5; }
    }
    .manage-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.82rem;
      color: #94a3b8;
    }
    .manage-footer a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>

  <!-- Nav -->
  <header class="nav">
    <div class="container nav-inner">
      <a href="https://getchowhub.com" class="logo" aria-label="ChowHub POS">
        <svg viewBox="0 0 200 60" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <polygon points="84.98 19.06 89.46 34.26 94.65 19.14 101.27 19.06 106.61 34.26 111.08 19.06 124.63 19.06 124.63 27.64 134.93 27.64 134.93 19.06 141.59 19.06 141.7 19.17 141.7 41.3 141.59 41.41 135.05 41.41 134.93 41.3 134.93 32.83 124.63 32.83 124.63 41.3 124.51 41.41 117.93 41.41 117.93 19.66 110.41 41.37 102.62 41.34 97.77 27.41 93.07 41.34 92.85 41.41 85.54 41.41 85.29 41.29 77.68 19.06 84.98 19.06"/>
          <path d="M168.11,19.06h14.26c4.21.29,8.5,1.65,8.09,6.73-.14,1.67-1.2,3.33-2.74,4.02l-.05.15c2.45.93,3.41,2.9,3.24,5.46-.31,4.74-5.37,5.92-9.29,5.98h-13.51v-22.35ZM181.69,24.1h-6.88v3.61h7.03c.3,0,1.24-.27,1.51-.45.66-.46.78-1.44.49-2.15-.16-.4-.62-.66-1.02-.79-.31-.1-.81-.2-1.13-.22ZM174.81,36.22h7.41c.34,0,1.17-.29,1.46-.49.79-.57.89-2.12.08-2.7-.25-.18-1.1-.49-1.39-.49h-7.56v3.69Z"/>
          <path d="M65.4,18.71c8.09-.44,14.92,3.87,14.31,12.66-.33,4.76-3.7,8.44-8.18,9.72-7.7,2.2-17.75-.74-18.3-9.95-.46-7.62,4.98-12.04,12.18-12.43ZM65.93,23.97c-4.82.28-6.82,3.91-5.7,8.44,1.37,5.51,11.24,5.46,12.52-.11,1.17-5.1-1.56-8.64-6.82-8.33Z"/>
          <polygon points="35.33 27.64 45.56 27.64 45.56 19.17 45.67 19.06 52.33 19.06 52.33 41.3 52.22 41.41 45.67 41.41 45.56 41.3 45.56 32.83 35.33 32.83 35.33 41.3 35.21 41.41 28.67 41.41 28.56 41.3 28.56 19.06 35.21 19.06 35.33 19.17 35.33 27.64"/>
          <path d="M28.1,26.74l-6.09,1.43c-1.12-3.97-5.98-4.8-9.48-3.8s-4.59,3.51-4.29,7c.4,4.71,6.39,5.86,10.12,4.63,1.81-.6,3.04-1.93,3.7-3.7l6.01,1.43c-.91,4-4.73,6.66-8.54,7.57-7.78,1.84-17.78-1.4-18.13-10.61-.38-9.76,9.92-13.37,18.06-11.52,3.92.89,7.68,3.47,8.65,7.56Z"/>
          <path d="M166.61,19.06v14.19c-.34,5.81-4.79,8.18-10.12,8.47-6.38.34-12.95-1.17-13.36-8.69v-13.96h6.66l.11.11v13.85c0,.74.58,1.97,1.17,2.44,1.63,1.3,6.29,1.29,7.86-.11.47-.42,1.05-1.57,1.05-2.18v-14l.11-.11h6.51Z"/>
          <circle cx="195.23" cy="38.16" r="3.16"/>
        </svg>
      </a>
      <a href="mailto:support@getchowhub.com" class="nav-contact">Support</a>
    </div>
  </header>

  <main class="container">
    <div class="manage-card">
      <h1>Manage Your Plan</h1>
      <p class="sub">Enter your upgrade code from the About ChowHub modal in your POS to verify your identity, then choose your new plan.</p>

      <label class="field-label" for="upgrade-code-input">Upgrade Code</label>
      <input
        class="field-input"
        id="upgrade-code-input"
        type="text"
        maxlength="8"
        placeholder="e.g. A1B2C3D4"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
      />

      <div class="radio-group" id="plan-options">
        <label class="radio-option" id="opt-pro">
          <input type="radio" name="target_tier" value="pro" />
          <div class="radio-option-info">
            <div class="radio-option-name">Pro — $59/month</div>
            <div class="radio-option-desc">Inventory, gift cards, reports</div>
          </div>
        </label>
        <label class="radio-option" id="opt-base">
          <input type="radio" name="target_tier" value="base" />
          <div class="radio-option-info">
            <div class="radio-option-name">Base — $29/month</div>
            <div class="radio-option-desc">Core POS features only</div>
          </div>
        </label>
        <label class="radio-option radio-option-cancel" id="opt-cancel">
          <input type="radio" name="target_tier" value="cancel" />
          <div class="radio-option-info">
            <div class="radio-option-name">Cancel subscription</div>
            <div class="radio-option-desc">Terminate service completely — no further charges</div>
          </div>
        </label>
      </div>

      <button class="manage-btn" id="submit-btn" disabled>Confirm Change</button>

      <div class="result-box" id="result-box"></div>

      <p class="manage-footer">
        Need help? <a href="mailto:support@getchowhub.com">support@getchowhub.com</a>
        &nbsp;·&nbsp;
        <a href="https://getchowhub.com/upgrade">View plans</a>
      </p>
    </div>
  </main>

  <script>
    const codeInput  = document.getElementById('upgrade-code-input');
    const submitBtn  = document.getElementById('submit-btn');
    const resultBox  = document.getElementById('result-box');
    const radios     = document.querySelectorAll('input[name="target_tier"]');
    const radioLabels = document.querySelectorAll('.radio-option');

    // Auto-uppercase the code
    codeInput.addEventListener('input', () => {
      const pos = codeInput.selectionStart;
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      codeInput.setSelectionRange(pos, pos);
      checkReady();
    });

    function btnLabelFor(value) {
      if (value === 'cancel') return 'Cancel Subscription';
      if (value === 'pro')    return 'Downgrade to Pro';
      if (value === 'base')   return 'Downgrade to Base';
      return 'Confirm Change';
    }

    radios.forEach((r, i) => {
      r.addEventListener('change', () => {
        radioLabels.forEach(l => l.classList.remove('selected'));
        radioLabels[i].classList.add('selected');
        submitBtn.classList.toggle('danger', r.value === 'cancel');
        submitBtn.textContent = btnLabelFor(r.value);
        checkReady();
      });
    });

    function checkReady() {
      const code = codeInput.value.trim();
      const chosen = document.querySelector('input[name="target_tier"]:checked');
      submitBtn.disabled = code.length < 6 || !chosen;
    }

    submitBtn.addEventListener('click', async () => {
      const code = codeInput.value.trim().toUpperCase();
      const chosen = document.querySelector('input[name="target_tier"]:checked');
      if (!chosen || code.length < 6) return;

      // Extra confirmation step for full cancellation
      if (chosen.value === 'cancel') {
        const ok = confirm(
          'Are you sure you want to cancel your subscription?\n\n' +
          'This will terminate your ChowHub POS service completely and stop all future charges. ' +
          'You will lose access to all paid features.\n\n' +
          'Click OK to confirm cancellation, or Cancel to go back.'
        );
        if (!ok) return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing…';
      resultBox.style.display = 'none';

      try {
        const res = await fetch('https://chowhub-license.ssl-dash.workers.dev/downgrade', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ upgrade_code: code, target_tier: chosen.value })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          resultBox.className = 'result-box success';
          if (chosen.value === 'cancel') {
            resultBox.innerHTML = `
              <strong>Cancelled.</strong> Your ChowHub POS subscription has been terminated and all future charges have stopped.<br>
              You'll receive a confirmation email shortly. To re-subscribe, visit <a href="https://getchowhub.com/upgrade">getchowhub.com/upgrade</a>.
            `;
          } else {
            const toLabel = chosen.value === 'pro' ? 'Pro' : 'Base';
            resultBox.innerHTML = `
              <strong>Done!</strong> Your plan has been changed to <strong>ChowHub POS ${toLabel}</strong>.<br>
              Open your ChowHub POS and click <strong>"Already upgraded? Check now"</strong> to refresh your plan.
            `;
          }
          resultBox.style.display = 'block';
          submitBtn.textContent = 'Change Confirmed';
          radios.forEach(r => r.disabled = true);
          codeInput.disabled = true;
        } else {
          resultBox.className = 'result-box error';
          resultBox.innerHTML = `<strong>Error:</strong> ${data.error || 'Something went wrong. Please try again or contact support.'}`;
          resultBox.style.display = 'block';
          const chosen2 = document.querySelector('input[name="target_tier"]:checked');
          submitBtn.disabled = false;
          submitBtn.textContent = btnLabelFor(chosen2?.value);
        }
      } catch (e) {
        resultBox.className = 'result-box error';
        resultBox.innerHTML = '<strong>Connection error.</strong> Please check your internet and try again.';
        resultBox.style.display = 'block';
        const chosen2 = document.querySelector('input[name="target_tier"]:checked');
        submitBtn.disabled = false;
        submitBtn.textContent = btnLabelFor(chosen2?.value);
      }
    });
  </script>
</body>
</html>
